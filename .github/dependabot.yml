# Weekly automated dependency updates for npm and GitHub Actions.
# Security updates land out-of-band when an advisory is published —
# Dependabot opens those automatically regardless of this schedule.
#
# `pnpm install` runs after Dependabot lands a PR so the lockfile stays
# in sync. Reviewer note: the matrix CI workflow re-runs on every
# Dependabot PR; merge only after green.

version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    # Group dev-tooling bumps so the PR queue doesn't drown in noise.
    # Run-time deps stay individual PRs since each is a real surface change.
    groups:
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
