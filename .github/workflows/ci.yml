name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.19.0', '22.13.0']

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9.15.4
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      # Build before typecheck: @appframe/core ships its types from
      # dist/, so web-preview's tsc can only resolve `@appframe/core`
      # after core has been built. pnpm build runs packages in
      # workspace-dependency order, so this populates core/dist first.
      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test
