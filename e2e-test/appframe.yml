app:
  name: "Impostor Game"
  description: "Social deduction party game"
  platforms: [ios, android]
  features:
    - Party game
    - Social deduction

theme:
  style: bold
  colors:
    primary: "#EF4444"
    secondary: "#7C3AED"
    background: "#0F0F1A"
    text: "#F8FAFC"
    subtitle: "#94A3B8"
  font: inter
  fontWeight: 700

frames:
  ios: iphone-16-pro-max
  android: pixel-10
  style: flat

screens:
  - screenshot: screenshots/screen-1-home.png
    headline: "Who's the Impostor?"
    subtitle: "The ultimate party game"
    layout: center

  - screenshot: screenshots/screen-2-setup.png
    headline: "Quick Setup"
    subtitle: "Start playing in seconds"
    layout: center

  - screenshot: screenshots/screen-3-names.png
    headline: "Add Your Friends"
    subtitle: "Everyone joins the fun"
    layout: center

  - screenshot: screenshots/screen-4-innocent.png
    headline: "Play Your Role"
    subtitle: "Blend in or get caught"
    layout: center

  - screenshot: screenshots/screen-5-impostor.png
    headline: "Find the Impostor"
    subtitle: "Trust no one"
    layout: center

output:
  platforms: [ios]
  ios:
    sizes: [6.7]
    format: png
  directory: ./output
