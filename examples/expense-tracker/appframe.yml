# appframe config — SpendWise (Expense Tracker)

app:
  name: "SpendWise"
  description: "Personal expense tracker with smart categorization and budget insights"
  platforms: [ios, android]
  features:
    - Smart expense categorization
    - Monthly budget tracking
    - Beautiful charts and insights
    - Multi-currency support
    - Receipt scanning

theme:
  style: minimal
  colors:
    primary: "#2563EB"
    secondary: "#7C3AED"
    background: "#F8FAFC"
    text: "#0F172A"
    subtitle: "#64748B"
  font: inter
  fontWeight: 600

frames:
  ios: generic-phone
  android: pixel-10
  style: flat

screens:
  - screenshot: screenshots/home.png
    headline: "Every expense, instantly tracked"
    subtitle: "Smart categorization does the work for you"
    layout: center

  - screenshot: screenshots/charts.png
    headline: "See where your money goes"
    subtitle: "Beautiful insights at a glance"
    layout: angled-right

  - screenshot: screenshots/budget.png
    headline: "Stay on budget, effortlessly"
    layout: center

  - screenshot: screenshots/categories.png
    headline: "Smart categories that learn"
    subtitle: "AI-powered expense sorting"
    layout: center

  - screenshot: screenshots/multi-currency.png
    headline: "Travel without worry"
    subtitle: "50+ currencies supported"
    layout: angled-left

locales:
  en:
    screens:
      - headline: "Every expense, instantly tracked"
        subtitle: "Smart categorization does the work for you"
      - headline: "See where your money goes"
        subtitle: "Beautiful insights at a glance"
      - headline: "Stay on budget, effortlessly"
      - headline: "Smart categories that learn"
        subtitle: "AI-powered expense sorting"
      - headline: "Travel without worry"
        subtitle: "50+ currencies supported"
  es:
    screens:
      - headline: "Cada gasto, registrado al instante"
        subtitle: "La categorizacion inteligente hace el trabajo por ti"
      - headline: "Mira a donde va tu dinero"
        subtitle: "Informacion clara de un vistazo"
      - headline: "Mantente en presupuesto, sin esfuerzo"
      - headline: "Categorias inteligentes que aprenden"
        subtitle: "Clasificacion de gastos con IA"
      - headline: "Viaja sin preocupaciones"
        subtitle: "Mas de 50 monedas soportadas"

output:
  platforms: [ios, android]
  ios:
    sizes: [6.7, 6.5]
    format: png
  android:
    sizes: ["phone"]
    format: png
    featureGraphic: true
  directory: ./output
