# appframe config — FitPulse (Fitness App)
# This example showcases varied compositions, per-screen backgrounds,
# and different layout strategies across slides.

app:
  name: "FitPulse"
  description: "Personal fitness tracker with workout plans, progress tracking, and community challenges"
  platforms: [ios, android]
  features:
    - Custom workout plans
    - Real-time progress tracking
    - Community challenges
    - Apple Watch integration
    - Nutrition logging

theme:
  style: glow
  colors:
    primary: "#6366F1"
    secondary: "#EC4899"
    background: "#0A0A0F"
    text: "#F8FAFC"
    subtitle: "#94A3B8"
  font: space-grotesk
  fontWeight: 700

frames:
  ios: iphone-17-pro
  android: generic-phone
  style: flat

screens:
  # Slide 1: Hero — centered, dark background (default theme)
  - screenshot: screenshots/home.png
    headline: "Your body,\nyour rules."
    subtitle: "Fitness that adapts to you"
    layout: center
    composition: single

  # Slide 2: Differentiator — angled, lighter background for contrast
  - screenshot: screenshots/workouts.png
    headline: "Plans that\nactually work."
    layout: angled-right
    background: "#1E1B4B"
    composition: single

  # Slide 3: Feature — peek right for visual variety
  - screenshot: screenshots/progress.png
    headline: "Watch yourself\nimprove."
    subtitle: "Every rep counts"
    layout: center
    composition: peek-right

  # Slide 4: Feature — peek left (pairs with previous peek-right)
  - screenshot: screenshots/challenges.png
    headline: "Compete with\nfriends."
    layout: center
    composition: peek-left
    background: "#18181B"

  # Slide 5: Trust/identity — back to centered, dark
  - screenshot: screenshots/nutrition.png
    headline: "Fuel your\nprogress."
    subtitle: "Built for people who show up"
    layout: center
    composition: single

output:
  platforms: [ios, android]
  ios:
    sizes: [6.7, 6.5]
    format: png
  android:
    sizes: ["phone"]
    format: png
    featureGraphic: true
  directory: ./output
