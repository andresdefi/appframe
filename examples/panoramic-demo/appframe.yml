# appframe panoramic config — FitPulse
# Mode: panoramic — all screenshots share one continuous canvas
# Elements can span frame boundaries for a cohesive visual effect

mode: panoramic
frameCount: 5

app:
  name: "FitPulse"
  description: "Personal fitness tracker"
  platforms: [ios]
  features:
    - Custom workout plans
    - Progress tracking
    - Social challenges

theme:
  style: glow
  colors:
    primary: "#6366F1"
    secondary: "#EC4899"
    background: "#0A0A0F"
    text: "#F8FAFC"
    subtitle: "#94A3B8"
  font: space-grotesk
  fontWeight: 700

frames:
  ios: generic-phone
  style: flat

panoramic:
  background:
    type: gradient
    gradient:
      type: linear
      colors: ["#0A0A0F", "#1E1B4B", "#312E81", "#1E1B4B", "#0A0A0F"]
      direction: 90

  elements:
    # === Decorative elements (behind everything) ===
    - type: decoration
      shape: circle
      x: 8
      y: 15
      width: 6
      height: 10
      color: "#6366F1"
      opacity: 0.15
      z: 0

    - type: decoration
      shape: circle
      x: 45
      y: 70
      width: 8
      height: 14
      color: "#EC4899"
      opacity: 0.1
      z: 0

    - type: decoration
      shape: circle
      x: 75
      y: 10
      width: 5
      height: 9
      color: "#6366F1"
      opacity: 0.12
      z: 0

    # === Text elements ===
    # Frame 1 headline (0-20% of canvas width)
    - type: text
      content: "Your body,\nyour rules."
      x: 2
      y: 4
      fontSize: 3.5
      color: "#F8FAFC"
      fontWeight: 700
      textAlign: left
      maxWidth: 18
      z: 10

    - type: text
      content: "Fitness that adapts to you"
      x: 2
      y: 15
      fontSize: 1.5
      color: "#94A3B8"
      fontWeight: 400
      z: 10

    # Frame 2 headline (20-40%)
    - type: text
      content: "Plans that\nactually work."
      x: 22
      y: 4
      fontSize: 3.5
      color: "#F8FAFC"
      fontWeight: 700
      textAlign: left
      maxWidth: 18
      z: 10

    # Frame 3 headline (40-60%)
    - type: text
      content: "Watch yourself\nimprove."
      x: 42
      y: 4
      fontSize: 3.5
      color: "#F8FAFC"
      fontWeight: 700
      textAlign: left
      maxWidth: 18
      z: 10

    # Frame 4 headline (60-80%)
    - type: text
      content: "Compete with\nfriends."
      x: 62
      y: 4
      fontSize: 3.5
      color: "#F8FAFC"
      fontWeight: 700
      textAlign: left
      maxWidth: 18
      z: 10

    # Frame 5 headline (80-100%)
    - type: text
      content: "Fuel your\nprogress."
      x: 82
      y: 4
      fontSize: 3.5
      color: "#F8FAFC"
      fontWeight: 700
      textAlign: left
      maxWidth: 18
      z: 10

    - type: text
      content: "Built for people who show up"
      x: 82
      y: 15
      fontSize: 1.5
      color: "#94A3B8"
      fontWeight: 400
      z: 10

    # === Device elements ===
    # Frame 1 — centered device
    - type: device
      screenshot: screenshots/screen-1.png
      x: 4
      y: 22
      width: 12
      rotation: 0
      z: 5

    # Frame 2 — tilted device spanning into frame 3
    - type: device
      screenshot: screenshots/screen-2.png
      x: 23
      y: 20
      width: 13
      rotation: -5
      z: 5

    # Frame 3 — device centered
    - type: device
      screenshot: screenshots/screen-3.png
      x: 44
      y: 22
      width: 12
      rotation: 0
      z: 5

    # Frame 4 — tilted opposite direction, bleeds into frame 3
    - type: device
      screenshot: screenshots/screen-4.png
      x: 63
      y: 20
      width: 13
      rotation: 5
      z: 4

    # Frame 5 — centered device
    - type: device
      screenshot: screenshots/screen-5.png
      x: 84
      y: 22
      width: 12
      rotation: 0
      z: 5

output:
  platforms: [ios]
  ios:
    sizes: [6.7]
    format: png
  directory: ./output
