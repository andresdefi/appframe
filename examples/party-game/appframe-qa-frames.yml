# QA config for visual inspection of Mac + Watch PNG device frames
# Start preview: node packages/cli/dist/index.js preview -c examples/party-game/appframe-qa-frames.yml
# Then use the Device dropdown in the UI to cycle through all 10 devices:
#
# Mac:   macbook-air-2020, macbook-air-2022, macbook-pro-2021-14, macbook-pro-2021-16, imac-2021, imac-24-silver
# Watch: watch-ultra, watch-series-7-45, watch-series-4-44, watch-series-4-40
#
# Check: screenshot visible inside frame, no gaps/offset, Watch corners properly rounded

app:
  name: "Frame QA"
  description: "Visual QA for Mac and Watch PNG device frames"
  platforms: [ios]

theme:
  style: minimal
  colors:
    primary: "#2563EB"
    secondary: "#7C3AED"
    background: "#F8FAFC"
    text: "#0F172A"
  font: inter
  fontWeight: 600

frames:
  ios: macbook-air-2022
  style: flat

screens:
  - screenshot: screenshots/light-test.png
    headline: "Frame Alignment Test"
    subtitle: "Check screenshot positioning inside device frame"
    layout: center

output:
  platforms: [ios]
  directory: ./output
