# appframe config — Impostor (Party Word Game)

app:
  name: "Impostor"
  description: "The ultimate party word game — find the impostor among your friends"
  platforms: [ios]
  features:
    - Bluffing word game
    - Play with any group
    - Multiple categories
    - No equipment needed

theme:
  style: glow
  colors:
    primary: "#A78BFA"
    secondary: "#7C3AED"
    background: "#0A0A0F"
    text: "#F8FAFC"
    subtitle: "#94A3B8"
  font: inter
  fontWeight: 700

frames:
  ios: generic-phone
  style: flat

screens:
  - screenshot: screenshots/home.png
    headline: "Trust No One"
    subtitle: "The ultimate party bluffing game"
    layout: center

  - screenshot: screenshots/setup.png
    headline: "Customize Every Round"
    subtitle: "Choose categories, players & impostors"
    layout: center

  - screenshot: screenshots/innocent.png
    headline: "Get Your Secret Word"
    layout: center

  - screenshot: screenshots/impostor.png
    headline: "Can You Blend In?"
    subtitle: "The impostor must bluff their way through"
    layout: center

  - screenshot: screenshots/play.png
    headline: "Give One-Word Clues"
    layout: center

  - screenshot: screenshots/results.png
    headline: "Catch the Impostor!"
    subtitle: "Vote, reveal & play again"
    layout: center

output:
  platforms: [ios]
  ios:
    sizes: [6.7, 6.5]
    format: png
  directory: ./output
