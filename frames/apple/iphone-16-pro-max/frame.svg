<svg xmlns="http://www.w3.org/2000/svg" width="438" height="910" viewBox="0 0 438 910" fill="none">
  <!-- iPhone 16 Pro Max frame - thin modern bezel -->
  <!-- Outer body -->
  <rect x="0" y="0" width="438" height="910" rx="54" ry="54" fill="#111111"/>
  <!-- Inner bezel -->
  <rect x="3" y="3" width="432" height="904" rx="52" ry="52" fill="#0A0A0A"/>
  <!-- Screen area -->
  <rect x="8" y="8" width="422" height="894" rx="50" ry="50" fill="#000000"/>
  <!-- Side button right -->
  <rect x="435" y="200" width="3" height="80" rx="1.5" fill="#1A1A1A"/>
  <!-- Volume buttons left -->
  <rect x="0" y="180" width="3" height="44" rx="1.5" fill="#1A1A1A"/>
  <rect x="0" y="240" width="3" height="44" rx="1.5" fill="#1A1A1A"/>
  <!-- Dynamic Island -->
  <rect x="157" y="19" width="124" height="37" rx="19" fill="#111111"/>
</svg>
