<svg xmlns="http://www.w3.org/2000/svg" width="446" height="926" viewBox="0 0 446 926" fill="none">
  <!-- iPhone 17 Pro Max frame - thin modern bezel -->
  <!-- Outer body -->
  <rect x="0" y="0" width="446" height="926" rx="54" ry="54" fill="#111111"/>
  <!-- Inner bezel -->
  <rect x="3" y="3" width="440" height="920" rx="52" ry="52" fill="#0A0A0A"/>
  <!-- Screen area -->
  <rect x="8" y="8" width="430" height="910" rx="50" ry="50" fill="#000000"/>
  <!-- Side button right -->
  <rect x="443" y="200" width="3" height="80" rx="1.5" fill="#1A1A1A"/>
  <!-- Volume buttons left -->
  <rect x="0" y="180" width="3" height="44" rx="1.5" fill="#1A1A1A"/>
  <rect x="0" y="240" width="3" height="44" rx="1.5" fill="#1A1A1A"/>
  <!-- Dynamic Island -->
  <rect x="160" y="19" width="126" height="37" rx="19" fill="#111111"/>
</svg>
