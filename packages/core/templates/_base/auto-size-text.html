{% if autoSizeHeadline or autoSizeSubtitle %}
<script>
(function() {
  function autoFit(selector) {
    var el = document.querySelector(selector);
    if (!el) return;
    var parent = el.parentElement;
    if (!parent) return;
    var maxW = parent.clientWidth;
    var maxH = parent.clientHeight * 0.5;
    var lo = 8, hi = 400, best = lo;
    var original = el.style.fontSize;
    while (lo <= hi) {
      var mid = Math.floor((lo + hi) / 2);
      el.style.fontSize = mid + 'px';
      if (el.scrollWidth <= maxW && el.scrollHeight <= maxH) {
        best = mid;
        lo = mid + 1;
      } else {
        hi = mid - 1;
      }
    }
    el.style.fontSize = best + 'px';
  }
  document.fonts.ready.then(function() {
    {% if autoSizeHeadline %}autoFit('.headline');{% endif %}
    {% if autoSizeSubtitle %}autoFit('.subtitle');{% endif %}
  });
})();
</script>
{% endif %}
