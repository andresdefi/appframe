<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: {{ canvasWidth }}px;
      height: {{ canvasHeight }}px;
      overflow: hidden;
      font-family: '{{ font | capitalize }}', 'Inter', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .canvas {
      width: {{ canvasWidth }}px;
      height: {{ canvasHeight }}px;
      position: relative;
      overflow: hidden;
    }

    {% block background %}{% endblock %}

    .content {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: {{ (canvasWidth * 0.06) | round }}px;
    }

    .text-area {
      text-align: center;
      z-index: 2;
    }

    .headline {
      font-weight: {{ fontWeight }};
      color: {{ colors.text }};
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: {{ colors.subtitle or colors.text }};
      opacity: {{ 1 if colors.subtitle else 0.65 }};
      line-height: 1.4;
    }

    .device-area {
      position: relative;
      z-index: 1;
    }

    .device-frame {
      position: relative;
    }

    .device-frame svg {
      display: block;
    }

    .device-screenshot {
      position: absolute;
      object-fit: cover;
    }

    {% block styles %}{% endblock %}
  </style>
</head>
<body>
  <div class="canvas">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
