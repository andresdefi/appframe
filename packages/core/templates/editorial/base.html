<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  {% set devScale = deviceScale | default(92) %}
  {% set devTop = deviceTop | default(15) %}
  {% set dw = (canvasWidth * devScale / 100) | round %}
  <style>
    {{ fontFaceCss | safe }}

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: {{ canvasWidth }}px;
      height: {{ canvasHeight }}px;
      overflow: hidden;
      font-family: '{{ font | capitalize }}', 'Inter', Georgia, serif;
      -webkit-font-smoothing: antialiased;
    }

    .canvas {
      width: {{ canvasWidth }}px;
      height: {{ canvasHeight }}px;
      position: relative;
      overflow: hidden;
      background: {{ colors.background }};
    }

    .text-area {
      position: absolute;
      z-index: 2;
      top: {{ (canvasHeight * 0.04) | round }}px;
      left: {{ (canvasWidth * 0.07) | round }}px;
      right: {{ (canvasWidth * 0.07) | round }}px;
      {% if layout == 'left' %}
        text-align: left;
      {% elif layout == 'right' %}
        text-align: right;
      {% else %}
        text-align: center;
      {% endif %}
    }

    .headline {
      font-size: {{ (canvasWidth * 0.08) | round }}px;
      font-weight: {{ fontWeight | default(500) }};
      color: {{ colors.text }};
      line-height: 1.18;
      letter-spacing: -0.01em;
      font-style: italic;
    }

    .divider {
      display: inline-block;
      width: {{ (canvasWidth * 0.08) | round }}px;
      height: 2px;
      background: {{ colors.primary }};
      margin-top: {{ (canvasWidth * 0.015) | round }}px;
      margin-bottom: {{ (canvasWidth * 0.008) | round }}px;
    }

    .subtitle {
      font-size: {{ (canvasWidth * 0.034) | round }}px;
      color: {{ colors.subtitle or colors.text }};
      opacity: {{ 1 if colors.subtitle else 0.5 }};
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-style: normal;
    }

    .device-wrapper {
      position: absolute;
      z-index: 1;
      width: {{ dw }}px;
      top: {{ (canvasHeight * devTop / 100) | round }}px;

      {% if layout == 'left' %}
        left: {{ (canvasWidth * 0.10) | round }}px;
      {% elif layout == 'right' %}
        right: {{ (canvasWidth * 0.10) | round }}px;
      {% elif layout == 'angled-left' %}
        left: 50%;
        transform: translateX(-50%) perspective(1200px) rotateY(5deg);
      {% elif layout == 'angled-right' %}
        left: 50%;
        transform: translateX(-50%) perspective(1200px) rotateY(-5deg);
      {% else %}
        left: 50%;
        transform: translateX(-50%);
      {% endif %}

      filter: drop-shadow(0 {{ (canvasWidth * 0.015) | round }}px {{ (canvasWidth * 0.04) | round }}px rgba(0,0,0,0.12));
    }

    .device-wrapper svg { width: 100%; height: auto; display: block; }
    .screenshot-clip { position: absolute; overflow: hidden; }
    .screenshot-clip img { width: 100%; height: 100%; object-fit: cover; display: block; }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="text-area">
      <div class="headline">{{ headline }}</div>
      <div class="divider"></div>
      {% if subtitle %}<div class="subtitle">{{ subtitle }}</div>{% endif %}
    </div>
    <div class="device-wrapper">
      {% if frameSvg and frameStyle != 'none' %}
        {{ frameSvg | safe }}
        <div class="screenshot-clip"
          style="left: {{ (frame.screenArea.x * dw / frame.frameSize.width) | round }}px;
                 top: {{ (frame.screenArea.y * dw / frame.frameSize.width) | round }}px;
                 width: {{ (frame.screenArea.width * dw / frame.frameSize.width) | round }}px;
                 height: {{ (frame.screenArea.height * dw / frame.frameSize.width) | round }}px;
                 border-radius: {{ (frame.screenArea.borderRadius * dw / frame.frameSize.width) | round }}px;">
          <img src="{{ screenshotDataUrl }}">
        </div>
      {% else %}
        <img src="{{ screenshotDataUrl }}" style="width: 100%; border-radius: {{ (canvasWidth * 0.035) | round }}px;">
      {% endif %}
    </div>
  </div>
</body>
</html>
