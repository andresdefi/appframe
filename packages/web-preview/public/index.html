<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>appframe — Preview</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #141420;
      --surface-2: #1e1e2e;
      --border: #2a2a3a;
      --text: #e2e8f0;
      --text-dim: #64748b;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: 320px;
      min-width: 320px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h1 { font-size: 16px; font-weight: 600; }
    .sidebar-header .app-name { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

    .section {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }

    input[type="text"], select, textarea {
      width: 100%;
      padding: 8px 10px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      margin-bottom: 10px;
    }

    input[type="text"]:focus, select:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; }

    input[type="color"] {
      width: 32px; height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      padding: 2px;
    }

    input[type="range"] {
      width: 100%;
      margin-bottom: 10px;
      accent-color: var(--accent);
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .range-row input[type="range"] {
      flex: 1;
      margin-bottom: 0;
    }

    .range-value {
      font-size: 12px;
      color: var(--text-dim);
      min-width: 28px;
      text-align: right;
    }

    .color-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .color-row label { margin: 0; flex: 1; }

    .btn-row { display: flex; gap: 8px; }

    .btn {
      padding: 8px 16px; border-radius: 6px; font-size: 13px;
      font-weight: 500; cursor: pointer; border: none; transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: white; flex: 1; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--border); }
    .btn-export { background: var(--green); color: white; flex: 1; }
    .btn-export:hover { background: #16a34a; }

    .inline-row {
      display: flex;
      gap: 10px;
    }

    .inline-row > div {
      flex: 1;
    }

    .export-size-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .export-size-row select {
      margin-bottom: 0;
    }

    /* ===== Preview Gallery ===== */

    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
      background-image: radial-gradient(circle at 1px 1px, var(--border) 1px, transparent 0);
      background-size: 24px 24px;
      position: relative;
    }

    .preview-gallery {
      display: flex;
      gap: 32px;
      align-items: center;
      padding: 48px 40px 48px 40px;
      overflow-x: auto;
      overflow-y: hidden;
      flex: 1;
      scroll-behavior: smooth;
      scroll-snap-type: x proximity;
    }

    .preview-gallery::-webkit-scrollbar {
      height: 6px;
    }
    .preview-gallery::-webkit-scrollbar-track {
      background: transparent;
    }
    .preview-gallery::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .preview-card {
      flex: 0 0 auto;
      scroll-snap-align: center;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      position: relative;
    }

    .preview-card.selected {
      transform: scale(1.03);
    }

    .preview-card:not(.selected) {
      opacity: 0.55;
    }
    .preview-card:not(.selected):hover {
      opacity: 0.8;
    }

    .preview-card-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .preview-card-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-dim);
      background: var(--surface);
      padding: 3px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .preview-card.selected .preview-card-label {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .preview-card-remove {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      cursor: pointer;
      line-height: 1;
      transition: all 0.15s;
    }
    .preview-card-remove:hover {
      background: #dc2626;
      border-color: #dc2626;
      color: white;
    }

    .preview-card-reorder {
      font-size: 13px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      cursor: pointer;
      line-height: 1;
      transition: all 0.15s;
    }
    .preview-card-reorder:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .preview-card-reorder:disabled {
      opacity: 0.25;
      cursor: default;
    }
    .preview-card-reorder:disabled:hover {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text-dim);
    }

    .screenshot-info {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .screenshot-thumb {
      width: 36px;
      height: 64px;
      border-radius: 4px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: var(--surface-2);
    }
    .screenshot-name {
      font-size: 11px;
      color: var(--text-dim);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .screenshot-upload-btn {
      width: 100%;
      padding: 7px 0;
      font-size: 12px;
      background: var(--surface-2);
      color: var(--text);
      border: 1px dashed var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: center;
    }
    .screenshot-upload-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .preview-container {
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      border-radius: 8px;
      overflow: hidden;
    }

    .preview-card.selected .preview-container {
      box-shadow: 0 0 0 2px var(--accent), 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    .preview-container iframe {
      width: 400px; height: 868px;
      border: none; display: block;
      transform-origin: top left;
    }

    .loading-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10, 10, 15, 0.8);
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }

    .loading-overlay.visible { opacity: 1; }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Add screen card */
    .add-screen-card {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      min-height: 200px;
      padding: 0 24px;
    }
    .add-screen-card:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(99, 102, 241, 0.05);
    }

    .status-bar {
      position: fixed; bottom: 0; left: 320px; right: 0;
      padding: 8px 20px; background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-dim);
      display: flex; justify-content: space-between;
    }

    .selected-indicator {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .selected-indicator .badge {
      background: var(--accent);
      color: white;
      padding: 1px 8px;
      border-radius: 3px;
      font-weight: 600;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>appframe</h1>
      <div class="app-name" id="app-name">Loading...</div>
    </div>

    <div class="section">
      <div class="section-title">Editing Screen</div>
      <div class="selected-indicator" id="selected-indicator">
        <span class="badge" id="selected-badge">1</span>
        <span id="selected-headline-preview">-</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Screenshot</div>
      <div class="screenshot-info" id="screenshot-info">
        <img class="screenshot-thumb" id="screenshot-thumb" alt="">
        <span class="screenshot-name" id="screenshot-name">From config</span>
      </div>
      <button class="screenshot-upload-btn" id="btn-upload-screenshot">Upload Screenshot</button>
      <input type="file" id="screenshot-file-input" accept="image/png,image/jpeg,image/webp" style="display: none;">
      <button class="btn" id="btn-clear-screenshot" style="width: 100%; padding: 4px 0; font-size: 11px; margin-top: 6px; display: none;">Revert to Config Screenshot</button>
    </div>

    <div class="section">
      <div class="section-title">Text</div>
      <label for="headline">Headline</label>
      <textarea id="headline" rows="2"></textarea>
      <label for="subtitle">Subtitle</label>
      <input type="text" id="subtitle" placeholder="Optional subtitle">
    </div>

    <div class="section">
      <div class="section-title">Style</div>
      <div class="inline-row">
        <div>
          <label for="template">Template</label>
          <select id="template">
            <option value="minimal">Minimal</option>
            <option value="bold">Bold</option>
            <option value="glow">Glow</option>
            <option value="playful">Playful</option>
            <option value="clean">Clean</option>
            <option value="branded">Branded</option>
            <option value="editorial">Editorial</option>
          </select>
        </div>
        <div>
          <label for="layout">Layout</label>
          <select id="layout">
            <option value="center">Center</option>
            <option value="angled-left">Angled Left</option>
            <option value="angled-right">Angled Right</option>
            <option value="floating">Floating</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Text Position</div>
      <span style="font-size: 11px; color: #888; line-height: 1.3; display: block; margin-bottom: 6px;">Drag the headline or subtitle in the preview to reposition them.</span>
      <button class="btn" id="btn-reset-text" style="width: 100%; padding: 5px 0; font-size: 11px;">Reset to Default</button>
    </div>

    <div class="section">
      <div class="section-title">Typography</div>
      <label for="font">Font</label>
      <select id="font"><option value="">Loading...</option></select>
      <label for="font-weight">Font Weight</label>
      <div class="range-row">
        <input type="range" id="font-weight" min="400" max="800" step="100" value="700">
        <span class="range-value" id="font-weight-value">700</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Colors</div>
      <div class="color-row"><label>Primary</label><input type="color" id="color-primary"></div>
      <div class="color-row"><label>Secondary</label><input type="color" id="color-secondary"></div>
      <div class="color-row"><label>Background</label><input type="color" id="color-background"></div>
      <div class="color-row"><label>Text</label><input type="color" id="color-text"></div>
      <div class="color-row"><label>Subtitle</label><input type="color" id="color-subtitle"></div>
    </div>

    <div class="section">
      <div class="section-title">Device Frame</div>
      <label for="frame-id">Device</label>
      <select id="frame-id"><option value="">Loading...</option></select>
      <label for="frame-style">Frame Style</label>
      <select id="frame-style">
        <option value="flat">Flat</option>
        <option value="floating">Floating</option>
        <option value="none">None (frameless)</option>
      </select>
    </div>

    <div class="section">
      <div class="section-title">Device Layout</div>
      <label for="device-scale">Device Size</label>
      <div class="range-row">
        <input type="range" id="device-scale" min="50" max="100" step="1" value="92">
        <span class="range-value" id="device-scale-value">92%</span>
      </div>
      <label for="device-top">Device Position</label>
      <div class="range-row">
        <input type="range" id="device-top" min="-80" max="80" step="1" value="15">
        <span class="range-value" id="device-top-value">15%</span>
      </div>
      <label for="device-offset-x">Horizontal Position</label>
      <div class="range-row">
        <input type="range" id="device-offset-x" min="-80" max="80" step="1" value="0">
        <span class="range-value" id="device-offset-x-value">0</span>
      </div>
      <label for="device-rotation">Device Rotation</label>
      <div class="range-row">
        <input type="range" id="device-rotation" min="-45" max="45" step="1" value="0">
        <span class="range-value" id="device-rotation-value">0°</span>
      </div>
      <div id="angle-row" style="display: none;">
        <label for="device-angle">Perspective Angle</label>
        <div class="range-row">
          <input type="range" id="device-angle" min="2" max="45" step="1" value="8">
          <span class="range-value" id="device-angle-value">8°</span>
        </div>
      </div>
      <label for="device-tilt">3D Tilt</label>
      <div class="range-row">
        <input type="range" id="device-tilt" min="0" max="20" step="1" value="0">
        <span class="range-value" id="device-tilt-value">0°</span>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Locale</div>
      <select id="locale"><option value="default">Default</option></select>
    </div>

    <div class="section">
      <div class="section-title">Export</div>
      <label for="export-size">Output Size</label>
      <select id="export-size">
        <option value="ios-6.7">iPhone 6.7" (1290x2796)</option>
        <option value="ios-6.5">iPhone 6.5" (1284x2778)</option>
        <option value="ios-5.5">iPhone 5.5" (1242x2208)</option>
        <option value="android-phone">Android Phone (1080x1920)</option>
      </select>
      <div class="btn-row" style="margin-top: 4px;">
        <button class="btn btn-export" id="btn-export">Download Screenshot</button>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Preview Background</div>
      <div class="inline-row">
        <div>
          <label>
            <input type="radio" name="preview-bg" value="dark" checked style="accent-color: var(--accent); margin-right: 4px;">Dark
          </label>
        </div>
        <div>
          <label>
            <input type="radio" name="preview-bg" value="light" style="accent-color: var(--accent); margin-right: 4px;">Light
          </label>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="btn-row">
        <button class="btn btn-primary" id="btn-refresh">Refresh All</button>
        <button class="btn btn-secondary" id="btn-reload">Reload Config</button>
      </div>
    </div>
  </div>

  <div class="preview-area" id="preview-area">
    <div class="preview-gallery" id="preview-gallery"></div>
  </div>

  <div class="status-bar">
    <span id="status-text">Ready</span>
    <span id="status-size"></span>
  </div>

  <script>
    var API = '';
    var config = null;
    var screenStates = [];
    var selectedScreen = 0;
    var debounceTimer = null;
    var framesData = [];
    var fontsData = [];

    // ===== Utilities =====

    function clearChildren(el) {
      while (el.firstChild) el.removeChild(el.firstChild);
    }

    function addOption(select, value, text) {
      var opt = document.createElement('option');
      opt.value = value;
      opt.textContent = text;
      select.appendChild(opt);
    }

    function createSpinner() {
      var s = document.createElement('div');
      s.className = 'spinner';
      return s;
    }

    // ===== Per-Screen State =====

    function createScreenState(index, cfg) {
      var screen = cfg.screens[index];
      var layout = screen ? screen.layout : 'center';
      if (layout === 'left' || layout === 'right') layout = 'center';

      return {
        screenIndex: index,
        headline: screen ? screen.headline : 'New Screen',
        subtitle: screen ? (screen.subtitle || '') : '',
        style: cfg.theme.style,
        layout: layout,
        font: cfg.theme.font,
        fontWeight: cfg.theme.fontWeight,
        colors: {
          primary: cfg.theme.colors.primary,
          secondary: cfg.theme.colors.secondary,
          background: cfg.theme.colors.background,
          text: cfg.theme.colors.text,
          subtitle: cfg.theme.colors.subtitle || '#64748B',
        },
        frameId: cfg.frames.ios || cfg.frames.android || '',
        frameStyle: cfg.frames.style === '3d' ? 'flat' : cfg.frames.style,
        deviceScale: 92,
        deviceTop: 15,
        deviceRotation: 0,
        deviceOffsetX: 0,
        deviceAngle: 8,
        deviceTilt: 0,
        textPositions: { headline: null, subtitle: null },
        screenshotDataUrl: null,
        screenshotName: screen ? (screen.screenshot || '').split('/').pop() : null,
        iframeEl: null,
        containerEl: null,
        dragOverlayEl: null,
        loadingEl: null,
      };
    }

    // ===== Sync Controls <-> State =====

    function saveControlsToState(index) {
      var state = screenStates[index];
      if (!state) return;
      state.headline = document.getElementById('headline').value;
      state.subtitle = document.getElementById('subtitle').value;
      state.style = document.getElementById('template').value;
      state.layout = document.getElementById('layout').value;
      state.font = document.getElementById('font').value;
      state.fontWeight = parseInt(document.getElementById('font-weight').value, 10);
      state.colors = {
        primary: document.getElementById('color-primary').value,
        secondary: document.getElementById('color-secondary').value,
        background: document.getElementById('color-background').value,
        text: document.getElementById('color-text').value,
        subtitle: document.getElementById('color-subtitle').value,
      };
      state.frameId = document.getElementById('frame-id').value;
      state.frameStyle = document.getElementById('frame-style').value;
      state.deviceScale = parseInt(document.getElementById('device-scale').value, 10);
      state.deviceTop = parseInt(document.getElementById('device-top').value, 10);
      state.deviceRotation = parseInt(document.getElementById('device-rotation').value, 10);
      state.deviceOffsetX = parseInt(document.getElementById('device-offset-x').value, 10);
      state.deviceAngle = parseInt(document.getElementById('device-angle').value, 10);
      state.deviceTilt = parseInt(document.getElementById('device-tilt').value, 10);
    }

    function syncControlsFromState(index) {
      var state = screenStates[index];
      if (!state) return;
      document.getElementById('headline').value = state.headline;
      document.getElementById('subtitle').value = state.subtitle;
      document.getElementById('template').value = state.style;
      document.getElementById('layout').value = state.layout;
      document.getElementById('font').value = state.font;
      document.getElementById('font-weight').value = state.fontWeight;
      document.getElementById('font-weight-value').textContent = state.fontWeight;
      document.getElementById('color-primary').value = state.colors.primary;
      document.getElementById('color-secondary').value = state.colors.secondary;
      document.getElementById('color-background').value = state.colors.background;
      document.getElementById('color-text').value = state.colors.text;
      document.getElementById('color-subtitle').value = state.colors.subtitle;
      document.getElementById('frame-id').value = state.frameId;
      document.getElementById('frame-style').value = state.frameStyle;
      document.getElementById('device-scale').value = state.deviceScale;
      document.getElementById('device-scale-value').textContent = state.deviceScale + '%';
      document.getElementById('device-top').value = state.deviceTop;
      document.getElementById('device-top-value').textContent = state.deviceTop + '%';
      document.getElementById('device-offset-x').value = state.deviceOffsetX;
      document.getElementById('device-offset-x-value').textContent = state.deviceOffsetX;
      document.getElementById('device-rotation').value = state.deviceRotation;
      document.getElementById('device-rotation-value').textContent = state.deviceRotation + '\u00B0';
      document.getElementById('device-angle').value = state.deviceAngle;
      document.getElementById('device-angle-value').textContent = state.deviceAngle + '\u00B0';
      document.getElementById('device-tilt').value = state.deviceTilt;
      document.getElementById('device-tilt-value').textContent = state.deviceTilt + '\u00B0';
      updateAngleRowVisibility();
      updateSelectedIndicator();
      updateScreenshotInfo();
    }

    function updateScreenshotInfo() {
      var state = screenStates[selectedScreen];
      if (!state) return;
      var thumb = document.getElementById('screenshot-thumb');
      var nameEl = document.getElementById('screenshot-name');
      var clearBtn = document.getElementById('btn-clear-screenshot');

      if (state.screenshotDataUrl) {
        thumb.src = state.screenshotDataUrl;
        nameEl.textContent = state.screenshotName || 'Custom upload';
        clearBtn.style.display = '';
      } else {
        thumb.src = '';
        nameEl.textContent = state.screenshotName || 'From config';
        clearBtn.style.display = 'none';
      }
    }

    function updateSelectedIndicator() {
      var state = screenStates[selectedScreen];
      if (!state) return;
      document.getElementById('selected-badge').textContent = String(selectedScreen + 1);
      var preview = state.headline.length > 30 ? state.headline.substring(0, 30) + '...' : state.headline;
      document.getElementById('selected-headline-preview').textContent = preview;
    }

    // ===== Gallery DOM =====

    function buildGallery() {
      var gallery = document.getElementById('preview-gallery');
      clearChildren(gallery);

      screenStates.forEach(function(state, i) {
        var card = document.createElement('div');
        card.className = 'preview-card' + (i === selectedScreen ? ' selected' : '');
        card.dataset.screenIndex = String(i);

        var header = document.createElement('div');
        header.className = 'preview-card-header';

        if (screenStates.length > 1) {
          var leftBtn = document.createElement('button');
          leftBtn.className = 'preview-card-reorder';
          leftBtn.textContent = '\u2039';
          leftBtn.title = 'Move left';
          leftBtn.disabled = (i === 0);
          leftBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            moveScreen(i, i - 1);
          });
          header.appendChild(leftBtn);
        }

        var label = document.createElement('div');
        label.className = 'preview-card-label';
        label.textContent = 'Screen ' + (i + 1);
        header.appendChild(label);

        if (screenStates.length > 1) {
          var rightBtn = document.createElement('button');
          rightBtn.className = 'preview-card-reorder';
          rightBtn.textContent = '\u203A';
          rightBtn.title = 'Move right';
          rightBtn.disabled = (i === screenStates.length - 1);
          rightBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            moveScreen(i, i + 1);
          });
          header.appendChild(rightBtn);

          var removeBtn = document.createElement('button');
          removeBtn.className = 'preview-card-remove';
          removeBtn.textContent = '\u00D7';
          removeBtn.title = 'Remove screen';
          removeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            removeScreen(i);
          });
          header.appendChild(removeBtn);
        }

        card.appendChild(header);

        var container = document.createElement('div');
        container.className = 'preview-container';

        var iframe = document.createElement('iframe');
        iframe.style.width = '400px';
        iframe.style.height = '868px';
        iframe.style.border = 'none';
        iframe.style.display = 'block';
        iframe.style.transformOrigin = 'top left';
        container.appendChild(iframe);

        var dragOverlay = document.createElement('div');
        dragOverlay.style.cssText = 'position:absolute;inset:0;z-index:1;';
        container.appendChild(dragOverlay);

        var loading = document.createElement('div');
        loading.className = 'loading-overlay';
        loading.style.zIndex = '2';
        loading.appendChild(createSpinner());
        container.appendChild(loading);

        card.appendChild(container);
        gallery.appendChild(card);

        state.iframeEl = iframe;
        state.containerEl = container;
        state.dragOverlayEl = dragOverlay;
        state.loadingEl = loading;

        card.addEventListener('click', function() {
          selectScreen(i);
        });

        setupDragForScreen(i, dragOverlay, container);

        iframe.addEventListener('load', function() {
          applyTextPositionsForScreen(i);
        });
      });

      var addCard = document.createElement('div');
      addCard.className = 'add-screen-card';
      addCard.textContent = '+ Add Screen';
      addCard.addEventListener('click', addScreen);
      gallery.appendChild(addCard);

      scaleAllPreviews();
    }

    function scaleAllPreviews() {
      var area = document.getElementById('preview-area');
      var areaH = area.clientHeight - 120;
      var baseScale = Math.min(areaH / 868, 0.55);
      baseScale = Math.max(baseScale, 0.2);

      screenStates.forEach(function(state) {
        if (!state.iframeEl || !state.containerEl) return;
        state.iframeEl.style.transform = 'scale(' + baseScale + ')';
        state.containerEl.style.width = Math.round(400 * baseScale) + 'px';
        state.containerEl.style.height = Math.round(868 * baseScale) + 'px';
      });

      var addCard = document.querySelector('.add-screen-card');
      if (addCard) {
        addCard.style.width = Math.round(400 * baseScale * 0.5) + 'px';
        addCard.style.height = Math.round(868 * baseScale) + 'px';
      }
    }

    window.addEventListener('resize', scaleAllPreviews);

    // ===== Screen Selection =====

    function selectScreen(index) {
      if (index === selectedScreen) return;
      saveControlsToState(selectedScreen);
      selectedScreen = index;

      var cards = document.querySelectorAll('.preview-card');
      cards.forEach(function(card, i) {
        card.classList.toggle('selected', i === index);
      });

      syncControlsFromState(index);

      var selectedCard = cards[index];
      if (selectedCard) {
        selectedCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
      }
    }

    // ===== Add / Remove Screens =====

    function addScreen() {
      saveControlsToState(selectedScreen);
      var lastState = screenStates[screenStates.length - 1];

      var newState = createScreenState(0, config);
      newState.screenIndex = screenStates.length;
      newState.headline = 'Screen ' + (screenStates.length + 1);
      newState.subtitle = '';
      newState.style = lastState.style;
      newState.layout = lastState.layout;
      newState.font = lastState.font;
      newState.fontWeight = lastState.fontWeight;
      newState.colors = JSON.parse(JSON.stringify(lastState.colors));
      newState.frameId = lastState.frameId;
      newState.frameStyle = lastState.frameStyle;
      newState.deviceScale = lastState.deviceScale;
      newState.deviceTop = lastState.deviceTop;

      screenStates.push(newState);
      buildGallery();
      selectedScreen = screenStates.length - 1;

      var cards = document.querySelectorAll('.preview-card');
      cards.forEach(function(card, i) {
        card.classList.toggle('selected', i === selectedScreen);
      });

      syncControlsFromState(selectedScreen);
      renderPreviewForScreen(selectedScreen);

      var selectedCard = cards[selectedScreen];
      if (selectedCard) {
        setTimeout(function() {
          selectedCard.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
        }, 50);
      }
    }

    function removeScreen(index) {
      if (screenStates.length <= 1) return;
      screenStates.splice(index, 1);
      screenStates.forEach(function(s, i) { s.screenIndex = i; });

      if (selectedScreen >= screenStates.length) {
        selectedScreen = screenStates.length - 1;
      } else if (selectedScreen > index) {
        selectedScreen--;
      } else if (selectedScreen === index) {
        selectedScreen = Math.min(index, screenStates.length - 1);
      }

      buildGallery();
      var cards = document.querySelectorAll('.preview-card');
      cards.forEach(function(card, i) {
        card.classList.toggle('selected', i === selectedScreen);
      });
      syncControlsFromState(selectedScreen);
      renderAllScreens();
    }

    function moveScreen(fromIndex, toIndex) {
      if (toIndex < 0 || toIndex >= screenStates.length) return;
      saveControlsToState(selectedScreen);

      var item = screenStates.splice(fromIndex, 1)[0];
      screenStates.splice(toIndex, 0, item);
      screenStates.forEach(function(s, i) { s.screenIndex = i; });

      // Track selection: if we moved the selected screen, follow it
      if (selectedScreen === fromIndex) {
        selectedScreen = toIndex;
      } else if (selectedScreen === toIndex && fromIndex < toIndex) {
        selectedScreen--;
      } else if (selectedScreen === toIndex && fromIndex > toIndex) {
        selectedScreen++;
      }

      buildGallery();
      var cards = document.querySelectorAll('.preview-card');
      cards.forEach(function(card, i) {
        card.classList.toggle('selected', i === selectedScreen);
      });
      syncControlsFromState(selectedScreen);
      renderAllScreens();
    }

    // ===== Preview Rendering =====

    function getPreviewBodyForScreen(index) {
      var state = screenStates[index];
      return {
        screenIndex: state.screenIndex,
        screenshotDataUrl: state.screenshotDataUrl || undefined,
        locale: document.getElementById('locale').value,
        style: state.style,
        layout: state.layout,
        headline: state.headline,
        subtitle: state.subtitle || undefined,
        colors: state.colors,
        font: state.font,
        fontWeight: state.fontWeight,
        frameId: state.frameId,
        frameStyle: state.frameStyle,
        deviceScale: state.deviceScale,
        deviceTop: state.deviceTop,
        deviceRotation: state.deviceRotation,
        deviceOffsetX: state.deviceOffsetX,
        deviceAngle: state.deviceAngle,
        deviceTilt: state.deviceTilt,
        headlineTop: state.textPositions.headline ? state.textPositions.headline.top : undefined,
        headlineLeft: state.textPositions.headline ? state.textPositions.headline.left : undefined,
        headlineWidth: state.textPositions.headline ? state.textPositions.headline.width : undefined,
        subtitleTop: state.textPositions.subtitle ? state.textPositions.subtitle.top : undefined,
        subtitleLeft: state.textPositions.subtitle ? state.textPositions.subtitle.left : undefined,
        subtitleWidth: state.textPositions.subtitle ? state.textPositions.subtitle.width : undefined,
      };
    }

    async function renderPreviewForScreen(index) {
      var state = screenStates[index];
      if (!state || !state.iframeEl) return;

      state.loadingEl.classList.add('visible');

      var body = getPreviewBodyForScreen(index);
      body.width = 400;
      body.height = 868;

      try {
        var res = await fetch(API + '/api/preview-html', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          var err = await res.json();
          throw new Error(err.error || 'Preview failed');
        }

        var html = await res.text();
        state.iframeEl.srcdoc = html;
        document.getElementById('status-text').textContent = 'Ready';
      } catch (err) {
        document.getElementById('status-text').textContent = 'Error: ' + err.message;
      } finally {
        state.loadingEl.classList.remove('visible');
      }
    }

    function renderSelectedPreview() {
      saveControlsToState(selectedScreen);
      updateSelectedIndicator();
      renderPreviewForScreen(selectedScreen);
    }

    function renderAllScreens() {
      screenStates.forEach(function(state, i) {
        renderPreviewForScreen(i);
      });
    }

    // ===== Export =====

    async function exportScreenshot() {
      saveControlsToState(selectedScreen);

      var exportBtn = document.getElementById('btn-export');
      var originalText = exportBtn.textContent;
      exportBtn.textContent = 'Exporting...';
      exportBtn.disabled = true;
      document.getElementById('status-text').textContent = 'Exporting screen ' + (selectedScreen + 1) + '...';

      var body = getPreviewBodyForScreen(selectedScreen);
      body.sizeKey = document.getElementById('export-size').value;

      try {
        var res = await fetch(API + '/api/export', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          var err = await res.json();
          throw new Error(err.error || 'Export failed');
        }

        var blob = await res.blob();
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = res.headers.get('Content-Disposition')
          ? res.headers.get('Content-Disposition').split('filename=')[1].replace(/"/g, '')
          : 'screenshot.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        var sizeKb = Math.round(blob.size / 1024);
        document.getElementById('status-text').textContent = 'Exported (' + sizeKb + 'KB)';
      } catch (err) {
        document.getElementById('status-text').textContent = 'Export error: ' + err.message;
      } finally {
        exportBtn.textContent = originalText;
        exportBtn.disabled = false;
      }
    }

    // ===== Debounce / Throttle =====

    function debouncedRender() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(renderSelectedPreview, 300);
    }

    var throttleTimer = null;
    var throttlePending = false;
    function throttledRender() {
      if (!throttleTimer) {
        renderSelectedPreview();
        throttleTimer = setTimeout(function() {
          throttleTimer = null;
          if (throttlePending) {
            throttlePending = false;
            throttledRender();
          }
        }, 60);
      } else {
        throttlePending = true;
      }
    }

    // ===== Device Slider Instant DOM Update =====

    function updateDeviceInIframe() {
      var state = screenStates[selectedScreen];
      if (!state || !state.iframeEl) return;

      var iframe = state.iframeEl;
      var doc;
      try { doc = iframe.contentDocument || iframe.contentWindow.document; } catch(e) { return; }
      if (!doc) return;

      var wrapper = doc.querySelector('.device-wrapper');
      if (!wrapper) return;

      var deviceScale = parseInt(document.getElementById('device-scale').value, 10);
      var deviceTop = parseInt(document.getElementById('device-top').value, 10);
      var canvasWidth = 400;
      var canvasHeight = 868;
      var dw = Math.round(canvasWidth * deviceScale / 100);

      var deviceRotation = parseInt(document.getElementById('device-rotation').value, 10);
      var deviceOffsetX = parseInt(document.getElementById('device-offset-x').value, 10);
      var deviceAngle = parseInt(document.getElementById('device-angle').value, 10);
      var deviceTilt = parseInt(document.getElementById('device-tilt').value, 10);
      var offsetPx = Math.round(canvasWidth * deviceOffsetX / 100);

      wrapper.style.width = dw + 'px';
      wrapper.style.top = Math.round(canvasHeight * deviceTop / 100) + 'px';
      wrapper.style.left = 'calc(50% + ' + offsetPx + 'px)';
      wrapper.style.setProperty('--device-rotation', deviceRotation + 'deg');
      wrapper.style.setProperty('--device-angle', deviceAngle + 'deg');
      wrapper.style.setProperty('--device-tilt', deviceTilt + 'deg');

      var frameId = document.getElementById('frame-id').value;
      var frameStyle = document.getElementById('frame-style').value;
      var frame = framesData.find(function(f) { return f.id === frameId; });
      var clip = wrapper.querySelector('.screenshot-clip');

      if (clip && frame && frameStyle !== 'none') {
        var fw = frame.frameSize.width;
        var sa = frame.screenArea;
        clip.style.left = Math.round(sa.x * dw / fw) + 'px';
        clip.style.top = Math.round(sa.y * dw / fw) + 'px';
        clip.style.width = Math.round(sa.width * dw / fw) + 'px';
        clip.style.height = Math.round(sa.height * dw / fw) + 'px';
        clip.style.borderRadius = Math.round(sa.borderRadius * dw / fw) + 'px';
      }

      var svg = wrapper.querySelector('svg');
      if (svg) svg.style.width = '100%';

      var deviceTopPx = Math.round(canvasHeight * deviceTop / 100);

      var glow1 = doc.querySelector('.glow-1');
      if (glow1) glow1.style.top = deviceTopPx + 'px';
      var glow2 = doc.querySelector('.glow-2');
      if (glow2) glow2.style.top = Math.round(canvasHeight * (deviceTop + 30) / 100) + 'px';

      var orb1 = doc.querySelector('.orb-1');
      if (orb1) orb1.style.top = Math.round(canvasHeight * (deviceTop - 15) / 100) + 'px';
      var orb2 = doc.querySelector('.orb-2');
      if (orb2) orb2.style.top = Math.round(canvasHeight * (deviceTop + 25) / 100) + 'px';

      var bgGlow = doc.querySelector('.bg-glow');
      if (bgGlow) bgGlow.style.top = Math.round(canvasHeight * (deviceTop + 5) / 100) + 'px';

      var shape1 = doc.querySelector('.shape-1');
      if (shape1) shape1.style.top = Math.round(canvasHeight * (deviceTop - 20) / 100) + 'px';
      var shape3 = doc.querySelector('.shape-3');
      if (shape3) shape3.style.top = Math.round(canvasHeight * (deviceTop + 20) / 100) + 'px';

      var bgShape1 = doc.querySelector('.bg-shape-1');
      if (bgShape1) bgShape1.style.top = Math.round(canvasHeight * (deviceTop - 20) / 100) + 'px';
    }

    // ===== Text Drag per Screen =====

    function setupDragForScreen(index, overlay, container) {
      var dragState = null;
      var hoveredEl = null;

      function getInfo() {
        var state = screenStates[index];
        if (!state || !state.iframeEl) return null;
        var iframeDoc;
        try { iframeDoc = state.iframeEl.contentDocument; } catch(e) { return null; }
        if (!iframeDoc) return null;
        var containerRect = container.getBoundingClientRect();
        var scale = containerRect.width / 400;
        return { iframeDoc: iframeDoc, containerRect: containerRect, scale: scale };
      }

      function toIframe(clientX, clientY, info) {
        return {
          x: (clientX - info.containerRect.left) / info.scale,
          y: (clientY - info.containerRect.top) / info.scale
        };
      }

      function getElPos(el) {
        var top = 0, left = 0, curr = el;
        while (curr) { top += curr.offsetTop; left += curr.offsetLeft; curr = curr.offsetParent; }
        return { top: top, left: left, width: el.offsetWidth, height: el.offsetHeight };
      }

      function hitTest(ix, iy, iframeDoc) {
        var el = iframeDoc.elementFromPoint(ix, iy);
        while (el && el !== iframeDoc.documentElement) {
          if (el.classList && el.classList.contains('headline')) return { cls: 'headline', el: el };
          if (el.classList && el.classList.contains('subtitle')) return { cls: 'subtitle', el: el };
          el = el.parentElement;
        }
        return null;
      }

      overlay.addEventListener('mousemove', function(e) {
        if (dragState) return;
        if (index !== selectedScreen) {
          overlay.style.cursor = 'pointer';
          return;
        }
        var info = getInfo();
        if (!info) return;
        var pos = toIframe(e.clientX, e.clientY, info);
        var hit = hitTest(pos.x, pos.y, info.iframeDoc);

        var newHovered = hit ? hit.el : null;
        if (newHovered !== hoveredEl) {
          if (hoveredEl) hoveredEl.style.outline = 'none';
          hoveredEl = newHovered;
          if (hoveredEl) {
            hoveredEl.style.outline = '2px dashed rgba(99, 102, 241, 0.5)';
            hoveredEl.style.outlineOffset = '4px';
          }
        }
        overlay.style.cursor = hoveredEl ? 'grab' : '';
      });

      overlay.addEventListener('mouseleave', function() {
        if (hoveredEl && !dragState) {
          hoveredEl.style.outline = 'none';
          hoveredEl = null;
        }
        if (!dragState) overlay.style.cursor = '';
      });

      overlay.addEventListener('mousedown', function(e) {
        if (index !== selectedScreen) return;

        var info = getInfo();
        if (!info) return;
        var pos = toIframe(e.clientX, e.clientY, info);
        var hit = hitTest(pos.x, pos.y, info.iframeDoc);
        if (!hit) return;

        e.preventDefault();
        e.stopPropagation();

        var el = hit.el;
        var cls = hit.cls;
        var elPos = getElPos(el);
        var origWidth = elPos.width;
        var state = screenStates[index];

        var alreadyPositioned = !!(state.textPositions[cls]);
        var centerX = alreadyPositioned ? elPos.left : (elPos.left + elPos.width / 2);

        var offsetX = pos.x - centerX;
        var offsetY = pos.y - elPos.top;

        if (!alreadyPositioned) {
          el.style.position = 'fixed';
          el.style.top = elPos.top + 'px';
          el.style.left = centerX + 'px';
          el.style.transform = 'translateX(-50%)';
          el.style.zIndex = '10';
          el.style.margin = '0';
          el.style.width = origWidth + 'px';
        }

        el.style.outline = '2px dashed rgba(99, 102, 241, 0.7)';
        el.style.outlineOffset = '4px';
        overlay.style.cursor = 'grabbing';

        dragState = { cls: cls, el: el, offsetX: offsetX, offsetY: offsetY, info: info, origWidth: origWidth, screenIndex: index };

        function onMouseMove(ev) {
          if (!dragState) return;
          var p = toIframe(ev.clientX, ev.clientY, dragState.info);
          dragState.el.style.top = (p.y - dragState.offsetY) + 'px';
          dragState.el.style.left = (p.x - dragState.offsetX) + 'px';
        }

        function onMouseUp() {
          if (!dragState) return;
          var el2 = dragState.el;
          var cls2 = dragState.cls;
          el2.style.outline = 'none';
          overlay.style.cursor = 'grab';

          var finalPos = getElPos(el2);
          var topPct = (finalPos.top / 868) * 100;
          var leftPct = (finalPos.left / 400) * 100;
          var widthPct = (dragState.origWidth / 400) * 100;
          screenStates[dragState.screenIndex].textPositions[cls2] = {
            top: Math.round(topPct * 10) / 10,
            left: Math.round(leftPct * 10) / 10,
            width: Math.round(widthPct * 10) / 10
          };

          dragState = null;
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });
    }

    function applyTextPositionsForScreen(index) {
      var state = screenStates[index];
      if (!state || !state.iframeEl) return;
      var iframeDoc;
      try { iframeDoc = state.iframeEl.contentDocument; } catch(e) { return; }
      if (!iframeDoc) return;

      ['headline', 'subtitle'].forEach(function(cls) {
        var el = iframeDoc.querySelector('.' + cls);
        if (!el) return;
        if (state.textPositions[cls]) {
          el.style.position = 'fixed';
          el.style.top = state.textPositions[cls].top + '%';
          el.style.left = state.textPositions[cls].left + '%';
          el.style.transform = 'translateX(-50%)';
          el.style.zIndex = '10';
          el.style.margin = '0';
          el.style.width = state.textPositions[cls].width + '%';
        }
      });
    }

    // ===== Show/Hide Angle Slider =====

    function updateAngleRowVisibility() {
      var layout = document.getElementById('layout').value;
      var angleRow = document.getElementById('angle-row');
      angleRow.style.display = (layout === 'angled-left' || layout === 'angled-right') ? '' : 'none';
    }

    // ===== Event Handlers =====

    document.getElementById('btn-refresh').addEventListener('click', function() {
      saveControlsToState(selectedScreen);
      renderAllScreens();
    });
    document.getElementById('btn-export').addEventListener('click', exportScreenshot);

    document.getElementById('btn-reload').addEventListener('click', async function() {
      await fetch(API + '/api/reload', { method: 'POST' });
      var res = await fetch(API + '/api/config');
      config = await res.json();
      screenStates = config.screens.map(function(screen, i) {
        return createScreenState(i, config);
      });
      selectedScreen = 0;
      buildGallery();
      syncControlsFromState(0);
      renderAllScreens();
    });

    ['template', 'layout', 'frame-id', 'frame-style', 'font'].forEach(function(id) {
      document.getElementById(id).addEventListener('change', function() {
        renderSelectedPreview();
      });
    });

    document.getElementById('layout').addEventListener('change', updateAngleRowVisibility);

    document.getElementById('locale').addEventListener('change', function() {
      var locale = this.value;
      saveControlsToState(selectedScreen);
      screenStates.forEach(function(state, i) {
        var screen = config.screens[i];
        if (!screen) return;
        if (locale !== 'default' && config.locales && config.locales[locale]) {
          var ls = config.locales[locale].screens[i];
          if (ls) {
            state.headline = ls.headline || screen.headline;
            state.subtitle = ls.subtitle || screen.subtitle || '';
          }
        } else {
          state.headline = screen.headline;
          state.subtitle = screen.subtitle || '';
        }
      });
      syncControlsFromState(selectedScreen);
      renderAllScreens();
    });

    ['headline', 'subtitle'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', debouncedRender);
    });

    ['color-primary', 'color-secondary', 'color-background', 'color-text', 'color-subtitle'].forEach(function(id) {
      document.getElementById(id).addEventListener('input', debouncedRender);
    });

    document.getElementById('font-weight').addEventListener('input', function() {
      document.getElementById('font-weight-value').textContent = this.value;
      throttledRender();
    });

    document.getElementById('device-scale').addEventListener('input', function() {
      document.getElementById('device-scale-value').textContent = this.value + '%';
      updateDeviceInIframe();
    });
    document.getElementById('device-scale').addEventListener('change', renderSelectedPreview);

    document.getElementById('device-top').addEventListener('input', function() {
      document.getElementById('device-top-value').textContent = this.value + '%';
      updateDeviceInIframe();
    });
    document.getElementById('device-top').addEventListener('change', renderSelectedPreview);

    document.getElementById('device-offset-x').addEventListener('input', function() {
      document.getElementById('device-offset-x-value').textContent = this.value;
      updateDeviceInIframe();
    });
    document.getElementById('device-offset-x').addEventListener('change', renderSelectedPreview);

    document.getElementById('device-rotation').addEventListener('input', function() {
      document.getElementById('device-rotation-value').textContent = this.value + '\u00B0';
      updateDeviceInIframe();
    });
    document.getElementById('device-rotation').addEventListener('change', renderSelectedPreview);

    document.getElementById('device-angle').addEventListener('input', function() {
      document.getElementById('device-angle-value').textContent = this.value + '\u00B0';
      updateDeviceInIframe();
    });
    document.getElementById('device-angle').addEventListener('change', renderSelectedPreview);

    document.getElementById('device-tilt').addEventListener('input', function() {
      document.getElementById('device-tilt-value').textContent = this.value + '\u00B0';
      updateDeviceInIframe();
    });
    document.getElementById('device-tilt').addEventListener('change', renderSelectedPreview);

    document.getElementById('btn-reset-text').addEventListener('click', function() {
      screenStates[selectedScreen].textPositions.headline = null;
      screenStates[selectedScreen].textPositions.subtitle = null;
      renderPreviewForScreen(selectedScreen);
    });

    // Screenshot upload
    document.getElementById('btn-upload-screenshot').addEventListener('click', function() {
      document.getElementById('screenshot-file-input').click();
    });

    document.getElementById('screenshot-file-input').addEventListener('change', function() {
      var file = this.files[0];
      if (!file) return;
      var reader = new FileReader();
      reader.onload = function(e) {
        var state = screenStates[selectedScreen];
        state.screenshotDataUrl = e.target.result;
        state.screenshotName = file.name;
        updateScreenshotInfo();
        renderPreviewForScreen(selectedScreen);
      };
      reader.readAsDataURL(file);
      // Reset so the same file can be re-selected
      this.value = '';
    });

    document.getElementById('btn-clear-screenshot').addEventListener('click', function() {
      var state = screenStates[selectedScreen];
      state.screenshotDataUrl = null;
      var screen = config.screens[state.screenIndex];
      state.screenshotName = screen ? (screen.screenshot || '').split('/').pop() : null;
      updateScreenshotInfo();
      renderPreviewForScreen(selectedScreen);
    });

    document.querySelectorAll('input[name="preview-bg"]').forEach(function(radio) {
      radio.addEventListener('change', function() {
        var area = document.getElementById('preview-area');
        if (this.value === 'light') {
          area.style.background = '#ffffff';
          area.style.backgroundImage = 'none';
        } else {
          area.style.background = '';
          area.style.backgroundImage = '';
        }
      });
    });

    // ===== Initialization =====

    async function init() {
      var res = await fetch(API + '/api/config');
      config = await res.json();

      document.getElementById('app-name').textContent = config.app.name;

      var localeSelect = document.getElementById('locale');
      clearChildren(localeSelect);
      addOption(localeSelect, 'default', 'Default');
      if (config.locales) {
        Object.keys(config.locales).forEach(function(locale) {
          addOption(localeSelect, locale, locale.toUpperCase());
        });
      }

      var fontsRes = await fetch(API + '/api/fonts');
      fontsData = await fontsRes.json();
      var fontSelect = document.getElementById('font');
      clearChildren(fontSelect);
      fontsData.forEach(function(f) {
        addOption(fontSelect, f.id, f.name);
      });

      var framesRes = await fetch(API + '/api/frames');
      framesData = await framesRes.json();
      var frameSelect = document.getElementById('frame-id');
      clearChildren(frameSelect);
      framesData.forEach(function(f) {
        addOption(frameSelect, f.id, f.name + ' (' + f.year + ')');
      });

      screenStates = config.screens.map(function(screen, i) {
        return createScreenState(i, config);
      });

      selectedScreen = 0;
      buildGallery();
      syncControlsFromState(0);
      renderAllScreens();
    }

    init();
  </script>
</body>
</html>
